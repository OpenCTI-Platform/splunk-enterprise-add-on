[OCTI - Correlation - Outbound Suspicious Domain match in DNS queries]
search = | tstats earliest(_time) AS e_time \
    latest(_time) AS l_time \
    values(DNS.record_type) AS record_type \
    values(DNS.dest_category) AS category \
    values(nodename) AS nodename \
    count \
    from \
    datamodel=Network_Resolution \
    where DNS.query IN [ | inputlookup opencti_indicators | search main_observable_type="Domain-Name" | eval value=lower(value) | rename value AS DNS.query | format ] \
    DNS.src!="in-addr.arpa" DNS.src!="None" \
    by _time sourcetype index DNS.src DNS.dest DNS.query span=1d \
    | rename "DNS.*" as * \
    | eval query=coalesce(query, "") \
    | eval fqdn=lower(query) \
    | eval action=coalesce(action,"unknown") \
    | eval observable_value=fqdn \
    | lookup opencti_indicators value AS observable_value OUTPUT id AS indicator_id name AS indicator_name confidence AS indicator_confidence score AS indicator_score \
    | appendpipe \
        [ stats count \
        | where count == 0 \
        | fillnull value="N/A" e_time l_time record_type category nodename src dest sourcetype index count \
        | eval fqdn="No Results"] \
    | table _time nodename index sourcetype src dest query fqdn observable_value indicator_id indicator_name indicator_confidence indicator_score record_type category count
description = This indicator represents a Splunk detection query that identifies DNS resolution activity to a predefined list of hostnames.
