enableSched = 1
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
alert.suppress = 0
alert.track = 0
action.summary_index = 0

[OCTI - Correlation - Outbound Traffic to Suspicious IP Address]
search = | tstats \
    earliest(_time) AS e_time \
    latest(_time) AS l_time \
    sum(All_Traffic.bytes) as total_bytes \
    sum(All_Traffic.bytes_out) as total_bytes_out \
    sum(All_Traffic.bytes_in) as total_bytes_in \
    values(All_Traffic.src_port) as src_port \
    values(All_Traffic.dest_port) as dest_port \
    values(All_Traffic.direction) AS direction \
    values(All_Traffic.user) AS user \
    values(All_Traffic.app) AS app \
    dc(All_Traffic.dest_port) AS distinct_dest_ports \
    count \
    from datamodel=Network_Traffic \
    where index=* \
    All_Traffic.dest IN [ | inputlookup opencti_indicators | search main_observable_type="IPv4-Addr" OR main_observable_type="IPv6-Addr" | rename value AS All_Traffic.dest | format ] \
    nodename="All_Traffic" \
    by _time sourcetype index All_Traffic.dest All_Traffic.src All_Traffic.action span=1d \
    | rename "All_Traffic.*" as * sourcetype AS sourcetype index AS index \
    | eval dest_port=if(distinct_dest_ports>10,mvappend(mvindex(dest_port,0,5),"..."),dest_port) \
    | fillnull value="-" \
    | appendpipe \
        [stats count \
        | where count == 0 \
        | fillnull value="N/A" sourcetype index l_time e_time src app user action direction total_bytes total_bytes_in total_bytes_out src_port dest_port count \
        | fillnull value="No Results" dest] \
    | eval observable_value=dest \
    | lookup opencti_indicators value AS observable_value OUTPUT id AS indicator_id name AS indicator_name confidence AS indicator_confidence score AS indicator_score \
    | table _time index sourcetype src src_port dest dest_port direction user app action total_bytes total_bytes_in total_bytes_out count observable_value indicator_id indicator_name indicator_confidence indicator_score ref_id
description = This Splunk search is focused on analyzing network traffic patterns over a specified period.
