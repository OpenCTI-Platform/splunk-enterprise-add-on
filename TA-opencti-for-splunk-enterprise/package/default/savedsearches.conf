[OCTI - Correlation - File Hash Detected]
search = | tstats     values(Filesystem.user) as user \
        values(Filesystem.dest) as dest \
        values(Filesystem.file_name) as file_name \
        values(Filesystem.file_path) as file_path \
        values(Filesystem.file_hash) as file_hash \
        from datamodel=Endpoint.Filesystem \
        where Filesystem.file_hash IN [ | inputlookup opencti_indicators | fields value | regex value="(?i)^(?:[a-f0-9]{32}|[a-f0-9]{40}|[a-f0-9]{64})$" | rename value AS Filesystem.file_hash | format ] \
        by _time, Filesystem.file_hash \
    | rename Filesystem.* as * \
    | eval file_hash=coalesce(file_hash, Filesystem.file_hash) \
    | append [ \
        | tstats         values(Malware_Attacks.signature) as signature \
            values(Malware_Attacks.file_name) as file_name \
            values(Malware_Attacks.file_path) as file_path \
            values(Malware_Attacks.file_hash) as file_hash \
            values(Malware_Attacks.dest) as dest \
            values(Malware_Attacks.user) as user \
            from datamodel=Malware \
            where Malware_Attacks.file_hash IN [ | inputlookup opencti_indicators | fields value | regex value="(?i)^(?:[a-f0-9]{32}|[a-f0-9]{40}|[a-f0-9]{64})$" | rename value AS Malware_Attacks.file_hash | format ] \
            by _time, Malware_Attacks.file_hash \
        | rename Malware_Attacks.* as * \
    ] \
    | eval signature=coalesce(signature, "") \
    | fillnull value="N/A" \
    | eval observable_value=file_hash \
    | lookup opencti_indicators value AS observable_value OUTPUT id AS indicator_id name AS indicator_name confidence AS indicator_confidence score AS indicator_score \
    | table _time file_hash observable_value indicator_id indicator_name indicator_confidence indicator_score file_name file_path user dest signature \
    | sort - _time
description = This indicator represents the detection of file hashes associated with potentially malicious or unauthorized files.
